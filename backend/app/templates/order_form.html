<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% if order %}Редактирование{% else %}Создание{% endif %} заказа</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="form-container">
        <h1>{% if order %}Редактирование заказа{% else %}Новый заказ{% endif %}</h1>
        
        <form method="POST">
            <div class="form-group">
                <label>Клиент:</label>
                <select name="user_id" required>
                    <option value="">Выберите клиента</option>
                    {% for user in users %}
                    <option value="{{ user.id }}" {% if order and order.user_id == user.id %}selected{% endif %}>
                        {{ user.full_name }} ({{ user.login }})
                    </option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label>Пункт выдачи:</label>
                <select name="pickup_point_id" required>
                    <option value="">Выберите пункт выдачи</option>
                    {% for point in points %}
                    <option value="{{ point.id }}" {% if order and order.pickup_point_id == point.id %}selected{% endif %}>
                        {{ point.address }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label>Дата доставки:</label>
                <input type="date" name="delivery_date" value="{{ order.delivery_date if order else '' }}">
            </div>
            
            <div class="form-group">
                <label>Статус:</label>
                <select name="status">
                    <option value="Новый" {% if order and order.status == 'Новый' %}selected{% endif %}>Новый</option>
                    <option value="Завершен" {% if order and order.status == 'Завершен' %}selected{% endif %}>Завершен</option>
                    <option value="Отменен" {% if order and order.status == 'Отменен' %}selected{% endif %}>Отменен</option>
                </select>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Сохранить</button>
                <a href="/orders" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
</body>
</html>
