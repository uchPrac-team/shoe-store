<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% if product %}Редактирование{% else %}Добавление{% endif %} товара</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="form-container">
        <h1>{% if product %}Редактирование товара{% else %}Добавление нового товара{% endif %}</h1>
        
        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>Артикул:</label>
                <input type="text" name="article" value="{{ product.article if product else '' }}" required>
            </div>
            
            <div class="form-group">
                <label>Название:</label>
                <input type="text" name="name" value="{{ product.name if product else '' }}" required>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Цена:</label>
                    <input type="number" step="0.01" name="price" value="{{ product.price if product else '' }}" required>
                </div>
                
                <div class="form-group">
                    <label>Скидка %:</label>
                    <input type="number" name="discount" value="{{ product.discount if product else 0 }}">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Категория:</label>
                    <input type="text" name="category" value="{{ product.category if product else '' }}">
                </div>
                
                <div class="form-group">
                    <label>Остаток:</label>
                    <input type="number" name="stock" value="{{ product.stock if product else 0 }}">
                </div>
            </div>
            
            <div class="form-group">
                <label>Поставщик:</label>
                <input type="text" name="supplier" value="{{ product.supplier if product else '' }}">
            </div>
            
            <div class="form-group">
                <label>Производитель:</label>
                <input type="text" name="manufacturer" value="{{ product.manufacturer if product else '' }}">
            </div>
            
            <div class="form-group">
                <label>Описание:</label>
                <textarea name="description" rows="4">{{ product.description if product else '' }}</textarea>
            </div>
            
            <div class="form-group">
                <label>Фото:</label>
                <input type="file" name="photo" accept="image/*">
                {% if product and product.photo %}
                    <div class="current-photo">
                        <img src="/static/images/{{ product.photo }}" alt="" style="max-width: 100px;">
                    </div>
                {% endif %}
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Сохранить</button>
                <a href="/admin/products" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
</body>
</html>
